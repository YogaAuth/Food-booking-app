<!DOCTYPE html>
<html>
<head>
    <title>Food Booking App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🍔 Food Booking App</h1>

    <div class="container">

        <div class="food-card">
            <h2>Pizza</h2>
            <p>Price: ₹299</p>
            <button onclick="orderFood('Pizza')">Order Now</button>
        </div>

        <div class="food-card">
            <h2>Burger</h2>
            <p>Price: ₹199</p>
            <button onclick="orderFood('Burger')">Order Now</button>
        </div>

        <div class="food-card">
            <h2>Biryani</h2>
            <p>Price: ₹249</p>
            <button onclick="orderFood('Biryani')">Order Now</button>
        </div>

    </div>

    <h3 id="message"></h3>

    <script src="script.js"></script>

</body>
</html>
